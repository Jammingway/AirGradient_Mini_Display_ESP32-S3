; AirGradient Mini Display — Waveshare ESP32-S3-Touch-LCD-4.3 (ESP32-S3-N16R8)
; 800x480 RGB LCD (ST7262) + GT911 touch + CH422G IO expander

[env:esp32-s3-touch-lcd-43]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

; N16R8: 16MB QIO flash + 8MB Octal PSRAM
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv

monitor_speed = 115200
; Auto-decode panic backtraces to file:line in `pio device monitor`.
monitor_filters = esp32_exception_decoder, default

lib_deps =
  ; pinned: 9.5.0 has a font-rendering noise bug on ESP32-S3
  ; (https://forum.lvgl.io/t/random-rendering-noise-with-compressed-fonts-lvgl-9-5-0-esp32s3/24158)
  lvgl/lvgl@9.3.0
  bblanchon/ArduinoJson@^7.2.0

build_flags =
  -D BOARD_HAS_PSRAM
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D LV_CONF_PATH="\"${PROJECT_DIR}/include/lv_conf.h\""
  -D CORE_DEBUG_LEVEL=2
